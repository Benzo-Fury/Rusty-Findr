name: Release

on:
  release:
    types: [published]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: web
        run: bun run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.asset_name }}
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset_name: findr-linux-x86_64
            use_cross: true

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            asset_name: findr-linux-arm64
            use_cross: true

          - target: x86_64-pc-windows-gnu
            runner: ubuntu-latest
            asset_name: findr-windows-amd64.exe
            use_cross: true
            binary_suffix: .exe

          - target: x86_64-apple-darwin
            runner: macos-latest
            asset_name: findr-macos-x86_64-intel
            use_cross: false

          - target: aarch64-apple-darwin
            runner: macos-latest
            asset_name: findr-macos-arm64-silicon
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/rusty-findr${{ matrix.binary_suffix }}" \
             "${{ matrix.asset_name }}"

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            "${{ matrix.asset_name }}" \
            --clobber
